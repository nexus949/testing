<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/styles/rootStyles.css">
    <link rel="stylesheet" href="/styles/forgotPassword.css">
    <title>Budget Buddy | User Login</title>
</head>

<body>
    <div class="forgot-password-container">
        <form action="" id="forgot-password-form">
            <img src="/images/budget-buddy.png" alt="Logo" class="forgot-page-logo">
            <p class="forgot-password-title">Forgot Password</p><br>
            <p class="forgot-pass-info">If a Valid account is found, a password forgot link will be sent to this Email.</p><br>

            <label for="forgot-password" class="forgot-pass">Enter Your Email</label>
            <input type="text" placeholder="Enter your Email" name="forgotEmail" class="forgot-pass-input" required>
    
            <button type="submit" class="forgot-password-button">forgot Password</button>
        </form>
    </div>

    <script type="module" src="/scripts/forgotPassword.js"></script>
</body>

</html>
